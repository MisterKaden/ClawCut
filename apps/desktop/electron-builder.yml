appId: com.clawcut.desktop
productName: Clawcut
asar: false
electronVersion: 40.8.0

directories:
  output: dist

files:
  - out/**/*
  - package.json
  - "!src{,/**}"
  - "!electron.vite.config.ts"
  - "!tsconfig*.json"

extraResources:
  - from: ../../packages/openclaw-plugin/openclaw.plugin.json
    to: openclaw/openclaw.plugin.json

mac:
  category: public.app-category.video
  target:
    - target: dir
    - target: zip
  artifactName: Clawcut-${version}-${arch}.${ext}
